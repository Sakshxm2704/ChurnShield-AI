version: "3.9"

# ============================================================
# Churn Intelligence Platform — Full Stack (DB + API + UI)
# ============================================================
# Usage:
#   docker compose -f docker/docker-compose.fullstack.yml up -d
#   Open: http://localhost:8501 (Dashboard)
#         http://localhost:8000/docs (API Docs)
# ============================================================

services:
  postgres:
    image: postgres:15-alpine
    container_name: churn_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-churn_platform}
      POSTGRES_USER:     ${POSTGRES_USER:-churn_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-churn_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U churn_user -d churn_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - churn_net

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: churn_backend
    restart: unless-stopped
    environment:
      APP_ENV:     ${APP_ENV:-development}
      SECRET_KEY:  ${SECRET_KEY:-dev-secret-change-in-prod-32plus-chars!!!}
      DATABASE_URL: sqlite:////app/data/churn_platform.db
      LOG_LEVEL:   INFO
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
      - backend_logs:/app/logs
      - backend_models:/app/ml/models/saved
      - backend_reports:/app/reports
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - churn_net

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: churn_frontend
    restart: unless-stopped
    environment:
      API_URL:        http://backend:8000
      FRONTEND_PORT:  8501
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/health"]
      interval: 20s
      timeout: 10s
      retries: 3
    networks:
      - churn_net

volumes:
  postgres_data:
  backend_data:
  backend_logs:
  backend_models:
  backend_reports:

networks:
  churn_net:
    driver: bridge
